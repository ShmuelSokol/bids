name: DIBBS Daily Scrape

on:
  schedule:
    # 6:00 AM ET (11:00 UTC) — catch overnight posts before Abe starts
    - cron: '0 11 * * 1-5'
    # 12:00 PM ET (17:00 UTC) — catch morning posts
    - cron: '0 17 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Scrape DIBBS expansion FSCs (batch 1)
        run: |
          echo "Triggering DIBBS scrape batch 1..."
          curl -s -X POST "https://dibs-gov-production.up.railway.app/api/dibbs/scrape-now" | jq .
          sleep 5

      - name: Scrape batch 2
        run: |
          echo "Batch 2..."
          curl -s -X POST "https://dibs-gov-production.up.railway.app/api/dibbs/scrape-now" | jq .
          sleep 5

      - name: Scrape batch 3
        run: |
          echo "Batch 3..."
          curl -s -X POST "https://dibs-gov-production.up.railway.app/api/dibbs/scrape-now" | jq .
          sleep 5

      - name: Scrape batch 4
        run: |
          echo "Batch 4..."
          curl -s -X POST "https://dibs-gov-production.up.railway.app/api/dibbs/scrape-now" | jq .
          sleep 5

      - name: Scrape batch 5
        run: |
          echo "Batch 5..."
          curl -s -X POST "https://dibs-gov-production.up.railway.app/api/dibbs/scrape-now" | jq .
          sleep 5

      - name: Scrape batches 6-8
        run: |
          for i in 6 7 8; do
            echo "Batch $i..."
            curl -s -X POST "https://dibs-gov-production.up.railway.app/api/dibbs/scrape-now" | jq '.count, .fscs_remaining'
            sleep 5
          done

      - name: Summary
        run: |
          echo "DIBBS scrape complete. Each batch scraped 30 expansion FSCs."
          echo "Total: up to 240 FSCs across 8 batches."
